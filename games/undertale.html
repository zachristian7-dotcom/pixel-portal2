<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undertale | Pixel Portal</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

.embed-box {
  width: 100%;
  height: 100%;
}

.embed-box iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
}

canvas, iframe, #game {
  width: 100%;
  height: 100%;
  display: block;
}
</style>
</head>
<body>

<div class="embed-box">
  <iframe 
    id="utFrame"
    src="https://www.autistici.org/burnedprojects/UNDERTALE/"
    allowfullscreen
    allow="fullscreen; autoplay; gamepad; keyboard"
    tabindex="0">
  </iframe>
</div>

<script>
const frame = document.getElementById("utFrame");

function focusGame() {
  frame.focus();
}

frame.addEventListener("load", focusGame);

window.addEventListener("click", focusGame);
window.addEventListener("mousedown", focusGame);
window.addEventListener("mouseup", focusGame);
window.addEventListener("keydown", focusGame);
</script>

</body>
</html>
