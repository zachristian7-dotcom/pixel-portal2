<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>???</title>
<style>
body { margin:0; padding:0; overflow:hidden; background:#000; color:#00ff41; font-family:monospace; font-size:14px; }
.hacker-root { position:fixed; inset:0; display:flex; flex-direction:column; padding:16px; box-sizing:border-box; z-index:999999; }
.hacker-topbar, .hacker-footer { color:#00ff9c; }
.hacker-main { flex:1; display:flex; overflow:hidden; }
.hacker-left { flex:2 1 0; border-right:1px solid rgba(0,255,65,0.25); padding-right:8px; overflow:hidden; display:flex; flex-direction:column; }
.hacker-right { flex:1 1 0; padding-left:8px; overflow:hidden; position:relative; }
.terminal-output { flex:1 1 auto; overflow-y:auto; white-space:pre-wrap; padding-right:4px; }
.terminal-line {}
</style>
</head>
<body>

<!-- Audio element with multiple sources -->
<audio id="ambient-audio" loop>
  <source src="creepy.mp3" type="audio/mpeg">
  <source src="creepy.ogg" type="audio/ogg">
  Your browser does not support the audio element.
</audio>
<!-- Overlay + Mobile "Start" Button -->
<div id="start-overlay" style="
  position:fixed;
  inset:0;
  background:black;
  color:#00ff41;
  font-family:monospace;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:24px;
  z-index:10000000;
  text-align:center;
">
  Press any key to start<br><br>
  <button id="mobile-start-btn" style="
    font-family:monospace;
    font-size:20px;
    padding:12px 24px;
    background:rgba(0,255,65,0.1);
    color:#00ff41;
    border:2px solid #00ff41;
    border-radius:6px;
    cursor:pointer;
  ">Tap here to start</button>
</div>

<script>
// ============ CONFIG ============
const HACKER_CONFIG = {
  backgroundColor: "#000000",
  textColor: "#00ff41",
  accentColor: "#00ff9c",
  warningColor: "#ff0033",
  minTypeDelay: 5,
  maxTypeDelay: 15,
  blockDelay: 100,
  cursorBlinkSpeed: 200,
  matrixSpeed: 35,
  matrixCharSet: "01",
  systemUser: "system",
  systemHost: "core-node",
  systemVersion: "v12.7.1",
  systemCodename: "OBSIDIAN",
};

// ====== DOM HELPERS =======
function createElement(tag,className,parent){const el=document.createElement(tag);if(className)el.className=className;if(parent)parent.appendChild(el);return el;}
function setStyles(el,styles){Object.assign(el.style,styles);}

// ====== HACKER SCREEN =======
function createHackerScreenContainer(){
  const container=createElement("div","hacker-root",document.body);
  setStyles(container,{background:HACKER_CONFIG.backgroundColor,color:HACKER_CONFIG.textColor,display:"flex",flexDirection:"column",overflow:"hidden"});
  const topBar=createElement("div","hacker-topbar",container);
  const main=createElement("div","hacker-main",container);
  const footer=createElement("div","hacker-footer",container);
  setStyles(topBar,{display:"flex",justifyContent:"space-between",marginBottom:"8px",color:HACKER_CONFIG.accentColor});
  setStyles(main,{flex:"1 1 auto",display:"flex"});
  setStyles(footer,{marginTop:"8px",color:HACKER_CONFIG.accentColor,fontSize:"12px",opacity:"0.7"});
  const title=createElement("div","hacker-title",topBar);
  const status=createElement("div","hacker-status",topBar);
  title.textContent=`// ${HACKER_CONFIG.systemHost.toUpperCase()} :: ${HACKER_CONFIG.systemCodename}`;
  status.textContent="SYSTEM STATUS: UNSTABLE";
  const leftPane=createElement("div","hacker-left",main);
  const rightPane=createElement("div","hacker-right",main);
  footer.textContent="[ESC] terminate session  |  Unauthorized access detected";
  return {container,leftPane,rightPane,status};
}

// ===== TERMINAL =====
function createTerminalOutput(parent){const output=createElement("div","terminal-output",parent);return {output};}
function appendLine(output,text,color,delay){return new Promise(resolve=>{const line=createElement("div","terminal-line",output);line.textContent=text;if(color)line.style.color=color;output.scrollTop=output.scrollHeight;setTimeout(resolve,delay||0);});}
function typeLine(output,text,color){return new Promise(resolve=>{const line=createElement("div","terminal-line",output);if(color)line.style.color=color;let i=0;function step(){if(i>text.length){output.scrollTop=output.scrollHeight;return resolve();}line.textContent=text.slice(0,i);i++;output.scrollTop=output.scrollHeight;const delay=HACKER_CONFIG.minTypeDelay+Math.random()*(HACKER_CONFIG.maxTypeDelay-HACKER_CONFIG.minTypeDelay);setTimeout(step,delay);}step();});}

// ===== MATRIX =====
function createMatrixCanvas(parent){const canvas=createElement("canvas","matrix-canvas",parent);Object.assign(canvas.style,{position:"absolute",inset:"0"});return canvas;}
function startMatrixRain(canvas){const ctx=canvas.getContext("2d");let width=canvas.clientWidth,height=canvas.clientHeight;function resize(){width=canvas.clientWidth;height=canvas.clientHeight;canvas.width=width;canvas.height=height;}resize();window.addEventListener("resize",resize);const fontSize=14;const columns=Math.floor(width/fontSize);const drops=new Array(columns).fill(1);function draw(){ctx.fillStyle="rgba(0,0,0,0.15)";ctx.fillRect(0,0,width,height);ctx.fillStyle=HACKER_CONFIG.textColor;ctx.font=fontSize+"px monospace";for(let i=0;i<drops.length;i++){const text=HACKER_CONFIG.matrixCharSet[Math.floor(Math.random()*HACKER_CONFIG.matrixCharSet.length)];const x=i*fontSize;const y=drops[i]*fontSize;ctx.fillText(text,x,y);if(y>height && Math.random()>0.975)drops[i]=0;drops[i]++;}}const intervalId=setInterval(draw,HACKER_CONFIG.matrixSpeed);return ()=>{clearInterval(intervalId);window.removeEventListener("resize",resize);};}

// ===== RANDOM DATA =====
function randomHex(len){const chars="0123456789abcdef";let out="";for(let i=0;i<len;i++)out+=chars[Math.floor(Math.random()*chars.length)];return out;}
function randomIp(){return Math.floor(Math.random()*256)+"."+Math.floor(Math.random()*256)+"."+Math.floor(Math.random()*256)+"."+Math.floor(Math.random()*256);}
function randomPort(){return Math.floor(Math.random()*60000)+1024;}
function randomPercent(){return (Math.random()*100).toFixed(1)+"%";}

// ===== SERIOUS SEQUENCE + COUNTDOWN =====
async function runHackerSequence(terminal,statusEl){
  const {output}=terminal;
  async function cmd(command,color){await appendLine(output,`${HACKER_CONFIG.systemUser}@${HACKER_CONFIG.systemHost}$ ${command}`,color||HACKER_CONFIG.accentColor); await wait(HACKER_CONFIG.blockDelay/2);}
  statusEl.textContent="SYSTEM STATUS: COMPROMISED";

  // ===== Ambient music plays immediately =====
  const audio=document.getElementById('ambient-audio');
  audio.volume=0.75;
  audio.play().catch(()=>{document.addEventListener('keydown',()=>{audio.play();},{once:true});});

  // Hacking steps
  await appendLine(output,">>> ALERT: Unauthorized process detected",HACKER_CONFIG.warningColor,300);
  await appendLine(output,">>> Attempting containment...",HACKER_CONFIG.warningColor,300);
  await appendLine(output,">>> Containment failed",HACKER_CONFIG.warningColor,300);
  await appendLine(output,"",null,200);
  await cmd("trace --source");
  await typeLine(output,`Source: ${randomIp()}:${randomPort()}`,null);
  await typeLine(output,"Status: ACTIVE CONNECTION",HACKER_CONFIG.warningColor);
  await appendLine(output,"",null,300);
  await cmd("scan --core --deep");
  for(let i=0;i<12;i++) await typeLine(output,`Scanning module ${i+1}/12 ...`,null);
  await typeLine(output,"Integrity: DEGRADED",HACKER_CONFIG.warningColor);
  await appendLine(output,"",null,300);
  await cmd("override --force");
  await typeLine(output,"Attempting override...",null);
  await typeLine(output,"Override rejected",HACKER_CONFIG.warningColor);
  await appendLine(output,"",null,300);
  await cmd("dump --active-sessions");
  for(let i=0;i<6;i++){ const line=`SESSION ${i+1}: ${randomIp()}  PORT ${randomPort()}  LOAD ${randomPercent()}`; await typeLine(output,line,null);}
  await appendLine(output,"",null,300);
  await cmd("decrypt --payload");
  await typeLine(output,"Decrypting...",null);
  await typeLine(output,"Key mismatch",HACKER_CONFIG.warningColor);
  await typeLine(output,"Attempting brute-force...",null);
  for(let i=0;i<20;i++) await typeLine(output,`Attempt ${i+1}: ${randomHex(32)}`,null);
  await typeLine(output,"Brute-force successful",HACKER_CONFIG.accentColor);
  await appendLine(output,"",null,300);
  await typeLine(output,">>> PAYLOAD CONTENT <<<",HACKER_CONFIG.accentColor);
  await typeLine(output,"System breach simulated.",null);
  await typeLine(output,"This is an easter egg.",null);
  await typeLine(output,"No real systems were accessed.",null);
  await typeLine(output,"If your heart rate increased, mission accomplished.",null);
  await appendLine(output,"",null,400);
  await cmd('echo "Press ESC to terminate intrusion simulation."');

  // ===== Countdown =====
  statusEl.textContent="SYSTEM STATUS: COMPROMISED - FINALIZING";
  await appendLine(output,"",null,200);
  await appendLine(output,"Fully accessing account data in...",HACKER_CONFIG.warningColor);
  for(let i=3;i>=1;i--) await appendLine(output,`${i}...`,HACKER_CONFIG.warningColor,800);

  // ===== Error overlay =====
  const errorOverlay=document.createElement('div');
  Object.assign(errorOverlay.style,{
      position:'fixed',inset:'0',backgroundColor:'black',color:'red',
      fontSize:'50px',textAlign:'center',display:'flex',
      justifyContent:'center',alignItems:'center',zIndex:'9999999'
  });
  errorOverlay.textContent='!!! SYSTEM FAILURE !!!';
  document.body.appendChild(errorOverlay);

  // ===== Fade out music =====
  let fadeOut=setInterval(()=>{if(audio.volume>0.05){audio.volume-=0.02;}else{audio.pause();clearInterval(fadeOut);}},100);
}

// ===== UTIL =====
function wait(ms){return new Promise(resolve=>setTimeout(resolve,ms));}

// ===== INIT =====
function showHackerScreen(){
  const {container,leftPane,rightPane,status}=createHackerScreenContainer();
  const terminal=createTerminalOutput(leftPane);
  const canvas=createMatrixCanvas(rightPane);
  const stopMatrix=startMatrixRain(canvas);
  runHackerSequence(terminal,status);
}

window.addEventListener("load", () => {
  const overlay = document.getElementById("start-overlay");
  const audio = document.getElementById("ambient-audio");
  const mobileBtn = document.getElementById("mobile-start-btn");

  function startExperience() {
    // Remove overlay
    overlay.remove();

    // Start music
    audio.volume = 0.7; // louder
    audio.loop = true;
    audio.play().catch(() => {});

    // Start hacker screen
    showHackerScreen();
  }

  // Desktop: any key press
  document.addEventListener("keydown", startExperience, { once: true });

  // Mobile/Tablet: tap the button
  mobileBtn.addEventListener("click", startExperience, { once: true });
});
</script>

</body>
</html>
