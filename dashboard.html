<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pixel Portal Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#09090b;
  color:white;
  min-height:100vh;
  padding:20px;
}

.hidden{
  display:none;
}

.card{
  background:#18181b;
  border:1px solid #27272a;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

input,
textarea{
  width:100%;
  margin-top:10px;
  margin-bottom:10px;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#27272a;
  color:white;
}

button{
  background:#22d3ee;
  color:black;
  border:none;
  padding:12px 16px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.9;
}

.note{
  background:#27272a;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  margin-bottom:20px;
}

.stat{
  background:#18181b;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

.stat h1{
  color:#22d3ee;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

  <div class="card" style="max-width:500px;margin:auto;margin-top:100px;">

    <h1>🔒 Pixel Portal</h1>

    <input
      type="email"
      id="email"
      placeholder="Email"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
    >

    <button id="loginBtn">
      Login / Create Account
    </button>

    <p id="status" style="margin-top:15px;"></p>

  </div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="hidden">

  <div class="topbar">

    <div>
      <h1>🛡 Pixel Portal Dashboard</h1>
      <p>Private command center</p>
    </div>

    <button id="logoutBtn">
      Logout
    </button>

  </div>

  <!-- STATS -->

  <div class="stats">

    <div class="stat">
      <p>Games</p>
      <h1 id="gamesStat">0</h1>
    </div>

    <div class="stat">
      <p>Notes</p>
      <h1 id="notesStat">0</h1>
    </div>

    <div class="stat">
      <p>Broken Games</p>
      <h1 id="brokenStat">0</h1>
    </div>

    <div class="stat">
      <p>Ideas</p>
      <h1 id="ideasStat">0</h1>
    </div>

  </div>

  <!-- GRID -->

  <div class="grid">

    <!-- GAME COUNT -->

    <div class="card">

      <h2>🎮 Games</h2>

      <input
        type="number"
        id="gameCount"
        placeholder="Total games"
      >

      <button id="saveGamesBtn">
        Save
      </button>

    </div>

    <!-- NOTES -->

    <div class="card">

      <h2>📝 Notes</h2>

      <input
        type="text"
        id="noteTitle"
        placeholder="Title"
      >

      <textarea
        id="noteContent"
        placeholder="Content"
      ></textarea>

      <button id="addNoteBtn">
        Add Note
      </button>

      <div id="notesContainer"></div>

    </div>

    <!-- BROKEN -->

    <div class="card">

      <h2>⚠ Broken Games</h2>

      <input
        type="text"
        id="brokenTitle"
        placeholder="Game Name"
      >

      <textarea
        id="brokenContent"
        placeholder="Issue"
      ></textarea>

      <button id="addBrokenBtn">
        Add Broken Game
      </button>

      <div id="brokenContainer"></div>

    </div>

    <!-- IDEAS -->

    <div class="card">

      <h2>💡 Ideas</h2>

      <input
        type="text"
        id="ideaTitle"
        placeholder="Idea"
      >

      <textarea
        id="ideaContent"
        placeholder="Description"
      ></textarea>

      <button id="addIdeaBtn">
        Add Idea
      </button>

      <div id="ideasContainer"></div>

    </div>

  </div>

</div>

<script type="module">

/* =========================
   FIREBASE IMPORTS
========================= */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signOut,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {

  apiKey: "AIzaSyDk0LDP2NWpKHddluXNW9tfgPuVIjWlac8",

  authDomain: "vidr-library.firebaseapp.com",

  projectId: "vidr-library",

  storageBucket: "vidr-library.appspot.com",

  messagingSenderId: "817638492349",

  appId: "1:817638492349:web:88137e7a4011e88f694fd4"
};

/* =========================
   INITIALIZE FIREBASE
========================= */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

console.log("Firebase initialized");

/* =========================
   DATABASE
========================= */

let DB = {

  games: 0,

  notes: [],

  broken: [],

  ideas: []
};

/* =========================
   ELEMENTS
========================= */

const loginScreen =
document.getElementById("loginScreen");

const dashboard =
document.getElementById("dashboard");

const statusText =
document.getElementById("status");

/* =========================
   LOGIN BUTTON
========================= */

document
.getElementById("loginBtn")
.onclick = async () => {

  const email =
  document
  .getElementById("email")
  .value
  .trim()
  .toLowerCase();

  const password =
  document
  .getElementById("password")
  .value;

  if (!email || !password) {

    statusText.textContent =
    "Enter email and password";

    return;
  }

  statusText.textContent =
  "Connecting...";

  console.log("Attempting login...");

  try {

    /* LOGIN */

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    console.log("Login successful");

    statusText.textContent =
    "Logged in";

  } catch (err) {

    console.log(
      "Login failed, creating account..."
    );

    console.error(err);

    try {

      /* CREATE ACCOUNT */

      await createUserWithEmailAndPassword(
        auth,
        email,
        password
      );

      console.log("Account created");

      await saveData();

      statusText.textContent =
      "Account created";

    } catch (createErr) {

      console.error(createErr);

      statusText.textContent =
      createErr.message;
    }
  }
};

/* =========================
   AUTH STATE
========================= */

onAuthStateChanged(
  auth,
  async (user) => {

    console.log(
      "Auth changed:",
      user
    );

    if (user) {

      try {

        await loadData();

        renderAll();

        loginScreen
        .classList
        .add("hidden");

        dashboard
        .classList
        .remove("hidden");

      } catch (err) {

        console.error(
          "Load error:",
          err
        );

        statusText.textContent =
        err.message;
      }

    } else {

      loginScreen
      .classList
      .remove("hidden");

      dashboard
      .classList
      .add("hidden");
    }
  }
);

/* =========================
   SAVE DATA
========================= */

async function saveData() {

  if (!auth.currentUser) return;

  try {

    await setDoc(

      doc(
        db,
        "users",
        auth.currentUser.uid
      ),

      DB
    );

    console.log("Data saved");

  } catch (err) {

    console.error(
      "Save error:",
      err
    );
  }
}

/* =========================
   LOAD DATA
========================= */

async function loadData() {

  if (!auth.currentUser) return;

  try {

    const ref = doc(
      db,
      "users",
      auth.currentUser.uid
    );

    const snap =
    await getDoc(ref);

    if (snap.exists()) {

      DB = snap.data();

      console.log(
        "Data loaded"
      );

    } else {

      console.log(
        "Creating new cloud save"
      );

      await saveData();
    }

  } catch (err) {

    console.error(
      "Load error:",
      err
    );
  }
}

/* =========================
   LOGOUT
========================= */

document
.getElementById("logoutBtn")
.onclick = async () => {

  try {

    await signOut(auth);

    console.log("Logged out");

  } catch (err) {

    console.error(err);
  }
};

/* =========================
   SAVE GAME COUNT
========================= */

document
.getElementById("saveGamesBtn")
.onclick = async () => {

  DB.games = Number(

    document
    .getElementById("gameCount")
    .value

  ) || 0;

  await saveData();

  renderStats();
};

/* =========================
   ADD NOTE
========================= */

document
.getElementById("addNoteBtn")
.onclick = async () => {

  const title =
  document
  .getElementById("noteTitle")
  .value;

  const content =
  document
  .getElementById("noteContent")
  .value;

  if (!title || !content)
  return;

  DB.notes.unshift({
    title,
    content
  });

  /* CLEAR INPUTS */

  document
  .getElementById("noteTitle")
  .value = "";

  document
  .getElementById("noteContent")
  .value = "";

  await saveData();

  renderAll();
};

/* =========================
   ADD BROKEN GAME
========================= */

document
.getElementById("addBrokenBtn")
.onclick = async () => {

  const title =
  document
  .getElementById("brokenTitle")
  .value;

  const content =
  document
  .getElementById("brokenContent")
  .value;

  if (!title || !content)
  return;

  DB.broken.unshift({
    title,
    content
  });

  /* CLEAR INPUTS */

  document
  .getElementById("brokenTitle")
  .value = "";

  document
  .getElementById("brokenContent")
  .value = "";

  await saveData();

  renderAll();
};

/* =========================
   ADD IDEA
========================= */

document
.getElementById("addIdeaBtn")
.onclick = async () => {

  const title =
  document
  .getElementById("ideaTitle")
  .value;

  const content =
  document
  .getElementById("ideaContent")
  .value;

  if (!title || !content)
  return;

  DB.ideas.unshift({
    title,
    content
  });

  /* CLEAR INPUTS */

  document
  .getElementById("ideaTitle")
  .value = "";

  document
  .getElementById("ideaContent")
  .value = "";

  await saveData();

  renderAll();
};

/* =========================
   RENDER STATS
========================= */

/* =========================
   ESCAPE HTML
========================= */

function escapeHTML(str) {

  if (!str) return "";

  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

/* =========================
   RENDER STATS
========================= */

function renderStats() {

  document
  .getElementById("gamesStat")
  .textContent = DB.games;

  document
  .getElementById("notesStat")
  .textContent = DB.notes.length;

  document
  .getElementById("brokenStat")
  .textContent = DB.broken.length;

  document
  .getElementById("ideasStat")
  .textContent = DB.ideas.length;
}

/* =========================
   RENDER NOTES
========================= */

function renderNotes() {

  const container =
  document.getElementById(
    "notesContainer"
  );

  container.innerHTML = "";

  DB.notes.forEach((note, index) => {

    container.innerHTML += `

      <div class="note">

        <div style="
          display:flex;
          justify-content:space-between;
          align-items:center;
          gap:10px;
          margin-bottom:10px;
        ">

          <h3>
            ${escapeHTML(note.title)}
          </h3>

          <button
            onclick="deleteNote(${index})"
            style="
              background:#ef4444;
              color:white;
              border:none;
              padding:6px 10px;
              border-radius:8px;
              cursor:pointer;
            "
          >
            Delete
          </button>

        </div>

        <p>
          ${escapeHTML(note.content)}
        </p>

      </div>
    `;
  });
}

/* =========================
   RENDER BROKEN
========================= */

function renderBroken() {

  const container =
  document.getElementById(
    "brokenContainer"
  );

  container.innerHTML = "";

  DB.broken.forEach((item, index) => {

    container.innerHTML += `

      <div class="note">

        <div style="
          display:flex;
          justify-content:space-between;
          align-items:center;
          gap:10px;
          margin-bottom:10px;
        ">

          <h3>
            ${escapeHTML(item.title)}
          </h3>

          <button
            onclick="deleteBroken(${index})"
            style="
              background:#ef4444;
              color:white;
              border:none;
              padding:6px 10px;
              border-radius:8px;
              cursor:pointer;
            "
          >
            Delete
          </button>

        </div>

        <p>
          ${escapeHTML(item.content)}
        </p>

      </div>
    `;
  });
}

/* =========================
   RENDER IDEAS
========================= */

function renderIdeas() {

  const container =
  document.getElementById(
    "ideasContainer"
  );

  container.innerHTML = "";

  DB.ideas.forEach((item, index) => {

    container.innerHTML += `

      <div class="note">

        <div style="
          display:flex;
          justify-content:space-between;
          align-items:center;
          gap:10px;
          margin-bottom:10px;
        ">

          <h3>
            ${escapeHTML(item.title)}
          </h3>

          <button
            onclick="deleteIdea(${index})"
            style="
              background:#ef4444;
              color:white;
              border:none;
              padding:6px 10px;
              border-radius:8px;
              cursor:pointer;
            "
          >
            Delete
          </button>

        </div>

        <p>
          ${escapeHTML(item.content)}
        </p>

      </div>
    `;
  });
}

/* =========================
   RENDER ALL
========================= */

function renderAll() {

  renderStats();

  renderNotes();

  renderBroken();

  renderIdeas();
}

/* =========================
   DELETE NOTE
========================= */

window.deleteNote = async (index) => {

  DB.notes.splice(index, 1);

  await saveData();

  renderAll();
};

/* =========================
   DELETE BROKEN
========================= */

window.deleteBroken = async (index) => {

  DB.broken.splice(index, 1);

  await saveData();

  renderAll();
};

/* =========================
   DELETE IDEA
========================= */

window.deleteIdea = async (index) => {

  DB.ideas.splice(index, 1);

  await saveData();

  renderAll();
};

</script>

</body>
</html>
