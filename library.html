<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Portal – Library</title>
<script src="tabcloak.js"></script>
<link rel="icon" href="images/favicon.png" id="base-favicon">
<link rel="icon" href="" id="dynamic-favicon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
.logo-link {
    display: inline-flex;
    flex-direction: column; /* Stacks items vertically */
    align-items: center;    /* Centers items horizontally */
    text-decoration: none;
    color: black;           /* Or your preferred color */
}

.pixel, .portal {
    display: block;         /* Ensures each span takes full width */
    line-height: 1.2;       /* Adjusts space between lines */
}
/* ---------- BACKGROUND ---------- */

body{
margin:0;
font-family:"Trebuchet MS",Arial,sans-serif;
background:url("images/galaxy.gif") center/cover fixed;
color:white;
text-align:center;
padding-bottom:120px;
}

/* ---------- LIQUID GLASS ---------- */

.glass {
  background: rgba(255, 255, 255, 0.02);
  backdrop-filter: blur(3px) saturate(180%);
  -webkit-backdrop-filter: blur(10px) saturate(180%);
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.5);
}

box-shadow:
0 10px 40px rgba(255,255,255,0.25),
inset 0 1px 0 rgba(255,255,255,0.25);

position:relative;
overflow:hidden;

transition:transform .25s,box-shadow .25s;
}

.game-card.glass:hover{
transform:translateY(-6px) scale(1.02);
}

.bottom-bar:hover {
  transform: translateX(-50%);
}

box-shadow:
0 18px 50px rgba(255,255,255,0.25),
0 0 25px rgba(79,209,255,0.25),
inset 0 1px 0 rgba(255,255,255,0.35);
}

/* cursor reflection */

.glass::before{
content:"";
position:absolute;
inset:0;

background:radial-gradient(
circle at var(--x) var(--y),
rgba(255,255,255,0.25)),
transparent 40%
);

opacity:0;
transition:opacity .25s;
pointer-events:none;
}

.glass:hover::before{
opacity:1;
}

/* ---------- LOGO ---------- */

.logo{
padding:30px 0 10px;
}

.pixel{
font-size:48px;
letter-spacing:4px;
color:#4fd1ff;
text-shadow:0 0 8px #4fd1ff;
}

.portal{
font-size:54px;
letter-spacing:6px;
color:#b47cff;
text-shadow:0 0 12px #7c5cff;
}

/* ---------- CONTROLS ---------- */

.controls{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;

margin:20px auto;
padding:12px 18px;

border-radius:18px;

width:max-content;

border: 1px solid rgba(255,255,255,0.2);
}

input, select {
  padding: 10px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px) saturate(160%);
  -webkit-backdrop-filter: blur(14px) saturate(160%);

  color: white;
  font-size: 14px;

  box-shadow:
    0 6px 20px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.25);

  outline: none;

  transition: all .2s ease;
}

input:hover, select:hover,
input:focus, select:focus {

  background: rgba(255,255,255,0.12);

  box-shadow:
    0 8px 30px rgba(0,0,0,0.45),
    0 0 15px rgba(79,209,255,0.25),
    inset 0 1px 0 rgba(255,255,255,0.35);
}

::placeholder{
  color: rgba(255,255,255,0.65);
}

.search-box{
display:flex;
align-items:center;
gap:8px;

padding:8px 14px;

border-radius:14px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.2);

box-shadow:
0 6px 20px rgba(0,0,0,0.35),
inset 0 1px 0 rgba(255,255,255,0.25);
}

.search-icon{
font-size:16px;
opacity:.8;
}

select{
padding:10px 14px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);

border:1px solid rgba(255,255,255,0.2);
border-radius:14px;

color:white;

box-shadow:
0 6px 20px rgba(0,0,0,0.35),
inset 0 1px 0 rgba(255,255,255,0.25);
}
/* remove input background so glass shows */

.search-box input{
background:transparent;
border:none;
outline:none;
color:white;
font-size:14px;
width:180px;
}

.search-box input::placeholder{
color:rgba(255,255,255,0.65);
}
/* ---------- GRID ---------- */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:22px;
padding:30px;
max-width:1200px;
margin:auto;
}

/* ---------- GAME CARDS ---------- */

.game-card{
padding:15px;
cursor:pointer;
transform-style:preserve-3d;
}

.game-card img{
width:100%;
border-radius:12px;
margin-bottom:10px;
transform:translateZ(20px);
}

.game-card h3{
margin:12px 0 6px;
transform:translateZ(30px);
}

.game-card p{
font-size:13px;
opacity:.9;
transform:translateZ(15px);
}

/* categories */

.categories{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:6px;
margin-top:8px;
}

.category{
background:rgba(255,255,255,0.18);
padding:4px 10px;
border-radius:12px;
font-size:11px;
}

/* featured */

.featured{
outline:6px solid gold;
}

.featured::after{
content:"FEATURED GAME";
position:50px;
bottom:-14px;
left:50%;
transform:translateX(-50%);
background:gold;
color:white;
padding:4px 14px;
font-size:12px;
font-weight:bold;
border-radius:12px;
}

/* new */

.new{
outline:6px solid #4fd1ff;
}

.new::after{
content:"NEW!";
position:50px;
bottom:-14px;
left:50%;
transform:translateX(-50%);
background:#4fd1ff;
color:white;
padding:4px 14px;
font-size:12px;
font-weight:bold;
border-radius:12px;
}

/* ---------- BOTTOM BAR ---------- */

.bottom-bar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:30px;
padding:14px 28px;
z-index:100;
}

.bottom-bar a{
color:white;
text-decoration:none;
font-weight:bold;
opacity:.8;
}

.bottom-bar a:hover{
opacity:1;
}

/* Glass style for select menus */
select {
  padding: 10px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);   /* glass effect */
  backdrop-filter: blur(14px) saturate(160%);
  -webkit-backdrop-filter: blur(14px) saturate(160%);
  color: white;                       /* text color inside select */
  font-size: 14px;
  outline: none;
  cursor: pointer;
  transition: all 0.25s ease;
}

select:hover {
  background: rgba(255,255,255,0.12);   /* slightly brighter on hover */
  color: black
}

.request-tag {
  position: sticky;
  top: 0; /* stays at the top of sidebar */
  background: linear-gradient(135deg, #4fd1ff, #7c5cff);
  color: white;
  padding: 12px 14px;
  border-radius: 12px;
  cursor: pointer;
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: transform 0.15s;
  z-index: 20;
}

.request-tag:hover {
  transform: scale(1.02);
}

.request-title {
  font-size: 16px;
  font-weight: bold;
}

.request-subtitle {
  font-size: 12px;
  opacity: 0.9;
}

img {
  width: 200px;
  height: 100px;
}

/* ---------- VIEW BUTTONS (GLASS STYLE) ---------- */

.view-toggle button,
#gamesBtn,
#collectionsBtn {

  padding: 10px 16px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.3);

  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(10px) saturate(180%);
  -webkit-backdrop-filter: blur(10px) saturate(180%);

  color: white;
  font-size: 14px;
  cursor: pointer;

  box-shadow:
    0 10px 30px rgba(255,255,255,0.2),
    inset 0 1px 0 rgba(255,255,255,0.25);

  transition: all 0.25s ease;
}

/* hover (same feel as cards lifting) */
#gamesBtn:hover,
#collectionsBtn:hover {
  transform: translateY(-3px) scale(1.03);
}

/* active (selected tab) */
#gamesBtn.active,
#collectionsBtn.active {
  background: rgba(255,255,255,0.12);
}

.game-card:hover{
  transform: translateY(-7px) scale(1.03);
  transition: all 0.25s ease;
}

@media (max-width: 700px){

  /* --- GRID: tighter + smoother --- */
  .grid{
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    padding: 12px;
  }

  /* --- CARDS: less bulky --- */
  .game-card{
    padding: 10px;
    border-radius: 14px;
  }

  .game-card h3{
    font-size: 0.9rem;
  }

  .game-card p{
    font-size: 0.75rem;
  }

  /* --- CONTROLS: stack clean --- */
  .controls{
    flex-direction: column;
    align-items: stretch;
    width: 92%;
  }

  .controls > *{
    width: 100%;
  }

  .search-box input{
    width: 100%;
  }

  /* --- LOGO: shrink --- */
  .pixel{
    font-size: 32px;
  }

  .portal{
    font-size: 36px;
  }

  /* --- REQUEST TAG: less intrusive --- */
  .request-tag{
    position: static;
    margin: 10px;
  }

  /* --- BOTTOM NAV: real mobile nav --- */
  .bottom-bar{
    bottom: 0;
    left: 0;
    transform: none;
    width: 100%;
    justify-content: space-around;
    border-radius: 16px 16px 0 0;
    padding: 10px;
    gap: 10px;
  }

}
.settings-btn{
  margin-left:6px;
  padding:6px 10px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  transition:.2s;
}

.settings-btn:hover{
  background:rgba(255,255,255,0.2);
  transform:scale(1.1);
}

.settings-popup{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;

  display:none;
  align-items:center;   /* center vertically */
  justify-content:center;

  background:rgba(0,0,0,0.6);

  z-index:2147483647;
}

/* POPUP BOX */
.settings-content{
  padding:25px;
  border-radius:20px;
  width:320px;
  text-align:center;
}

/* OPTIONS */
.cloak-options{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin:15px 0;
}

.cloak-options button{
  padding:8px 12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

.cloak-options button:hover{
  background:rgba(255,255,255,0.2);
}

/* CUSTOM */
.custom-cloak input{
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:8px;
  border:none;
}

/* CLOSE */
.close-btn{
  margin-top:15px;
  padding:8px 16px;
  border:none;
  border-radius:10px;
  background:#ff4d4d;
  color:white;
  cursor:pointer;
}

.cloak-options{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
  justify-items: stretch;
  margin: 15px 0;
  max-height: 260px;
  overflow-y: auto;
  padding-right: 4px;
}

/* cloak button */
.cloak-btn{
  display: flex;
  align-items: center;
  gap: 8px;

  padding: 8px 10px;
  border-radius: 10px;
  border: none;

  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;

  font-size: 13px;

  transition: 0.2s ease;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.cloak-btn:hover{
  background: rgba(255,255,255,0.2);
  transform: scale(1.03);
}

/* FORCE ALL ICONS TO 16x16 */
.cloak-btn img{
  width: 16px;
  height: 16px;
  min-width: 16px;
  min-height: 16px;

  object-fit: contain;
  flex-shrink: 0;
}

/* text handling */
.cloak-btn span{
  overflow: hidden;
  text-overflow: ellipsis;
}

.close-btn{
  margin-top:10px;
  background:#ff4d4d;
}

.reset-btn{
  background:#888;
}
</style>
</head>

<body>

<header class="logo">
  <a href="library.html" class="logo-link">
    <span class="pixel">PIXEL</span>
    <span class="portal">PORTAL</span>
  </a>
</header>

<div class="controls glass">

  <div class="search-box">
  <span class="search-icon">🔍</span>
  
  <input id="searchInput" placeholder="Search games or categories" oninput="renderGames()">
<button class="settings-btn" onclick="openSettings()">⚙️</button>
</div>

  <select id="sortSelect" onchange="renderGames()">
    <option value="newest">Newest</option>
    <option value="oldest">Oldest</option>
    <option value="title">A-Z</option>
  </select>

  <div style="display:flex;gap:8px;">
    <button id="gamesBtn" onclick="setView('games')">Games</button>
    <button id="collectionsBtn" onclick="setView('collections')">Collections</button>
  </div>

</div>
<div class="request-tag" onclick="window.location.href='request.html'">
  <div class="request-title">Want to see new games on Pixel Portal?</div>
  <div class="request-subtitle">Click on this tag to request new games!</div>
</div>
<div id="game-list" class="grid"></div>

<div class="bottom-bar glass">
  <a href="welcome.html">Welcome</a>
  <a href="library.html">Library</a>
  <a href="about.html">About</a>
  <a href="request.html">Request</a>
  <a href="devlog.html">DevLog</a>
  <a href="dmca.html">DMCA</a>
</div>

<!-- SINGLE SETTINGS POPUP (FIXED DUPLICATE REMOVED) -->
<div id="settingsPopup" class="settings-popup">
  <div class="settings-content glass">

    <h2>⚙️ Settings</h2>

    <h3>Tab Cloaking</h3>

    <div class="cloak-options" id="cloakOptions"></div>
    <button class="close-btn" onclick="resetCloak()">Reset to Default</button>
    <div class="custom-cloak">
      <input id="customTitle" placeholder="Custom Title">
      <input id="customIcon" placeholder="Favicon URL">
      <button onclick="applyCustomCloak()">Apply Custom</button>
    </div>

    <button class="close-btn" onclick="closeSettings()">Close</button>

  </div>
</div>

<script src="games.js"></script>
<script>
function openSettings(){
  document.getElementById("settingsPopup").style.display = "flex";
}

function closeSettings(){
  document.getElementById("settingsPopup").style.display = "none";
}
</script>
<script>

let currentView = "games";
let activeCollection = null;

/* ---------- VIEW SWITCH ---------- */

function setView(view){
  currentView = view;
  activeCollection = null;

  document.getElementById("gamesBtn").classList.remove("active");
  document.getElementById("collectionsBtn").classList.remove("active");

  if(view === "games") document.getElementById("gamesBtn").classList.add("active");
  if(view === "collections") document.getElementById("collectionsBtn").classList.add("active");

  renderGames();
}

/* ---------- RENDER ---------- */

function renderGames(){

  const list = document.getElementById("game-list");
  const search = document.getElementById("searchInput").value.toLowerCase();
  const sort = document.getElementById("sortSelect").value;

  list.innerHTML = "";

  /* =========================
     COLLECTIONS MODE
  ========================= */

  if(currentView === "collections"){

    /* SHOW COLLECTION LIST */
    if(!activeCollection){

      collections.forEach(col => {
        const card = document.createElement("div");
        card.className = "game-card glass";

        card.innerHTML = `
          <img src="images/collections/${col.thumbnails}">
          <h3>${col.name}</h3>
          <p>${col.desc}</p>
        `;

        card.onclick = () => {
          activeCollection = col;
          renderGames();
        };

        list.appendChild(card);
      });

      return;
    }

    /* INSIDE A COLLECTION */

    const back = document.createElement("div");
    back.className = "game-card glass";
    back.innerHTML = "<h3>← Back</h3>";

    back.onclick = () => {
      activeCollection = null;
      renderGames();
    };

    list.appendChild(back);

    games
      .filter(activeCollection.filter)
      .filter(g =>
        g.name.toLowerCase().includes(search) ||
        g.categories.join(" ").toLowerCase().includes(search)
      )
      .forEach(renderCard);

    return;
  }

  /* =========================
     GAMES MODE (NORMAL)
  ========================= */

  let filtered = games.filter(g =>
    g.name.toLowerCase().includes(search) ||
    g.categories.join(" ").toLowerCase().includes(search)
  );

  if(sort === "newest")
    filtered.sort((a,b)=>new Date(b.added)-new Date(a.added));

  if(sort === "oldest")
    filtered.sort((a,b)=>new Date(a.added)-new Date(b.added));

  if(sort === "title")
    filtered.sort((a,b)=>a.name.localeCompare(b.name));

  filtered.forEach(renderCard);
}

/* ---------- CARD RENDER ---------- */

function renderCard(game){

  const list = document.getElementById("game-list");

  const card = document.createElement("div");
  card.className =
    "game-card glass" +
    (game.featured ? " featured" : "") +
    (game.new ? " new" : "");

  card.innerHTML = `
    <img src="images/${game.thumbnail}">
    <h3>${game.name}</h3>
    <p>${game.description}</p>
    <p>Added on ${game.added}</p>
    <div class="categories">
      ${game.categories.map(c => `<span class="category">${c}</span>`).join("")}
    </div>
  `;

  if(game.id){
    card.onclick = () =>
      window.location.href = `play.html?game=${game.id}`;
  }

  card.addEventListener("mousemove", e => {
    const rect = card.getBoundingClientRect();
    card.style.setProperty("--x", (e.clientX - rect.left) + "px");
    card.style.setProperty("--y", (e.clientY - rect.top) + "px");
  });

  list.appendChild(card);
}

/* ---------- INIT ---------- */

setView("games");
renderGames();
</script>
<script>
function renderCloaks(){
  const container = document.getElementById("cloakOptions");
  if(!container) return;

  container.innerHTML = Object.entries(cloaks).map(([key, c]) => `
    <button class="cloak-btn" onclick="setCloak('${key}')">
      <img src="${c.icon}" onerror="this.style.display='none'">
      <span>${c.title}</span>
    </button>
  `).join("");
}

renderCloaks();
</script>
</body>
</html>
