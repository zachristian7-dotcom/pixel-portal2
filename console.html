<!DOCTYPE html>
<html>
<head>
<title>Pixel Portal Console</title>
<style>
body {
  margin: 0;
  background: black;
  color: #4fd1ff;
  font-family: monospace;
  padding: 20px;
}

.cursor {
  display: inline-block;
  width: 10px;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>
<body>

<h2>PIXEL PORTAL CONSOLE</h2>
<p>Welcome back, Administrator.</p>
<p>Status: ONLINE</p>

<br>
<p>> type "help" to view commands<span class="cursor">█</span></p>
</body>
</html>
