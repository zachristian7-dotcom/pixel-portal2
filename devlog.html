<style>
body{
margin:0;
font-family:"Trebuchet MS",Arial,sans-serif;
background:url("images/galaxy.gif") center/cover fixed;
color:white;
text-align:center;
padding-bottom:120px;
}

h1 {
  color: #4fd1ff;
  text-align: center;
  margin-bottom: 40px;
}

/* Devlog entry container */
.devlog-entry {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(6px);
  padding: 20px;
  margin-bottom: 20px;
  border-left: 4px solid #4fd1ff;
  border-radius: 12px;
  transition: transform 0.2s;
}

.devlog-entry:hover {
  transform: translateY(-3px);
}

/* Date */
.devlog-date {
  font-weight: bold;
  font-size: 16px;
  margin-bottom: 10px;
}

/* Major update highlights */
.devlog-major {
  color: #b47cff;
  font-weight: bold;
}

/* Minor update text */
.devlog-text {
  color: #ddd;
  font-size: 15px;
  margin: 5px 0;
}
</style>
</head>
